<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIBEHATON</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #C9A84C;
    --gold-bright: #F0C040;
    --gold-dim: #6A5020;
    --gold-mid: #9A7428;
    --black: #060604;
    /* shared padding scale: 28px at 620px viewport width */
    --pad: clamp(16px, 4.5vw, 28px);
  }

  body {
    background: #0a0a08;
    font-family: 'Bebas Neue', sans-serif;
    min-height: 100vh;
    min-height: 100svh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* Mobile: fill the full screen */
  .poster {
    width: 100%;
    max-width: 620px;
    height: 100vh;
    height: 100svh;
    background: var(--black);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Desktop: fill viewport height, derive width from aspect ratio */
  @media (min-width: 640px) {
    .poster {
      /* fill height; cap width at 100vw to avoid horizontal overflow */
      width: min(calc(100svh * 620 / 877), 100vw);
      max-width: none;
      height: auto;
      aspect-ratio: 620 / 877;
    }
  }

  /* Grain */
  .poster::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    opacity: 0.06;
    z-index: 50;
    pointer-events: none;
    mix-blend-mode: screen;
  }

  /* Corner marks */
  .corner {
    position: absolute;
    width: 16px;
    height: 16px;
    z-index: 60;
  }
  .corner-tl { top: 16px; left: 16px; border-top: 1px solid var(--gold-dim); border-left: 1px solid var(--gold-dim); }
  .corner-tr { top: 16px; right: 16px; border-top: 1px solid var(--gold-dim); border-right: 1px solid var(--gold-dim); }
  .corner-bl { bottom: 16px; left: 16px; border-bottom: 1px solid var(--gold-dim); border-left: 1px solid var(--gold-dim); }
  .corner-br { bottom: 16px; right: 16px; border-bottom: 1px solid var(--gold-dim); border-right: 1px solid var(--gold-dim); }

  /* ── HEADER ── */
  .header {
    padding: var(--pad) var(--pad) 0;
    position: relative;
    z-index: 5;
    flex-shrink: 0;
  }

  .header-top {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--gold-dim);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* 56px at 620px wide → 9vw; floor at 30px for narrow phones */
  .tagline {
    font-size: clamp(30px, 9vw, 56px);
    letter-spacing: -0.02em;
    color: var(--gold-bright);
    line-height: 0.88;
    text-transform: uppercase;
  }

  .sub {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--gold-mid);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 10px;
  }

  /* ── IMAGE — fills the middle ── */
  .image-wrap {
    flex: 1;
    position: relative;
    margin-top: 20px;
    overflow: hidden;
  }

  canvas#scene {
    width: 100%;
    height: 100%;
    display: block;
  }

  .vignette {
    position: absolute;
    inset: 0;
    z-index: 3;
    background:
      linear-gradient(to bottom, var(--black) 0%, transparent 18%),
      linear-gradient(to top,    var(--black) 0%, transparent 30%),
      linear-gradient(to right,  rgba(6,6,4,0.55) 0%, transparent 20%, transparent 80%, rgba(6,6,4,0.55) 100%);
    pointer-events: none;
  }

  /* ── BIG TITLE — over bottom of image ── */
  .title-block {
    position: absolute;
    bottom: 2px;
    left: 0; right: 0;
    z-index: 6;
    padding: 0 var(--pad);
    line-height: 1;
  }

  /* 104px at 620px wide → 16.8vw; floor at 52px */
  .title-main {
    font-size: clamp(52px, 16.8vw, 104px);
    letter-spacing: -0.015em;
    color: var(--gold-bright);
    display: block;
    text-transform: uppercase;
    white-space: nowrap;
    text-shadow:
      0 0 50px rgba(201,168,76,0.45),
      0 0 110px rgba(201,168,76,0.18);
  }

  /* ── FOOTER ── */
  .footer {
    padding: 14px var(--pad) var(--pad);
    position: relative;
    z-index: 5;
    flex-shrink: 0;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, var(--gold-mid), transparent 65%);
    margin-bottom: 14px;
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .date-label {
    font-family: 'Space Mono', monospace;
    font-size: 9.5px;
    color: var(--gold-dim);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-bottom: 5px;
    display: block;
  }

  /* 72px at 620px wide → 11.6vw; floor at 38px */
  .date-nums {
    font-size: clamp(38px, 11.6vw, 72px);
    line-height: 0.85;
    letter-spacing: -0.04em;
    color: var(--gold-bright);
  }

  /* "March 2026" — half the size of date-nums, auto-scales via em */
  .date-year {
    font-size: 0.5em;
    letter-spacing: -0.02em;
    color: var(--gold-mid);
    vertical-align: middle;
    margin-left: 0.14em;
  }

  .date-sub {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--gold-dim);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 6px;
    display: block;
  }

  .right-col {
    text-align: right;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--gold-mid);
    letter-spacing: 0.09em;
    text-transform: uppercase;
    line-height: 1.9;
  }

  .tag-row {
    display: flex;
    gap: 7px;
    flex-wrap: wrap;
    margin-top: 12px;
  }

  .tag {
    border: 1px solid var(--gold-dim);
    padding: 2px 8px;
    font-family: 'Space Mono', monospace;
    font-size: 8.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold-dim);
  }
</style>
</head>
<body>

<div class="poster">
  <canvas id="scene" style="position:absolute;inset:0;width:100%;height:100%;z-index:1;"></canvas>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="header">
    <div class="header-top">// A weekend of vibecoding — Bern, CH //</div>
    <div class="tagline">Vibe &amp;<br>build &amp;<br>ship.</div>
    <div class="sub">// best pros moving 10x into the future //</div>
  </div>

  <div class="image-wrap">
    <div class="vignette"></div>
    <div class="title-block">
      <span class="title-main">VIBEHATON</span>
    </div>
  </div>

  <div class="footer">
    <div class="divider"></div>
    <div class="info-row">
      <div>
        <div class="date-nums">27<br>28<br><span style="display:inline;">29</span><span class="date-year">March 2026</span></div>
        <span class="date-sub">Fri eve → Sun</span>
      </div>
      <div class="right-col">
        ~48h of code<br>
        good food &amp; good vibes
</div>
    </div>
    <div class="tag-row">
      <span class="tag">vibecoding</span>
      <span class="tag">weekend</span>
      <span class="tag">build together</span>
      <span class="tag">ship it</span>
    </div>
  </div>
</div>

<script src="scene.js"></script>
</body>
</html>
